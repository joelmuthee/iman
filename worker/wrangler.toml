name = "iman-high-street-api"
main = "src/index.js"
compatibility_date = "2025-01-01"
account_id = "58685495706b973821d77208248c66fc"

[[kv_namespaces]]
binding = "BAGS"
id = "a028f431a48d48c79c014cc247fa00bf"

# Workers AI — Llama 3.1 8B (text) + Llama 3.2 11B Vision for IG bulk-sync
# classification. Free tier: 10k requests/day, comfortable for daily syncs.
[ai]
binding = "AI"

# Two crons, dispatched by event.cron in scheduled():
#   "0 6 * * *"  → 09:00 EAT: IG auto-sync (new posts add themselves to the catalog)
#   "0 17 * * *" → 20:00 EAT: daily WhatsApp report (no-ops unless owner enabled it)
[triggers]
crons = ["0 6 * * *", "0 17 * * *"]

# Secrets — never committed:
#   npx wrangler secret put ADMIN_TOKEN
#   npx wrangler secret put WASENDER_TOKEN   (for the daily WhatsApp report)
